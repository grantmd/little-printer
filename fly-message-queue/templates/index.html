<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>little-printer</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                max-width: 32rem;
                margin: 3rem auto;
                padding: 0 1rem;
                line-height: 1.5;
            }
            label {
                display: block;
                margin-top: 1rem;
                font-weight: 600;
            }
            input,
            textarea {
                width: 100%;
                box-sizing: border-box;
                padding: 0.5rem;
                font-family: inherit;
                font-size: 1rem;
            }
            textarea {
                min-height: 6rem;
                resize: vertical;
            }
            .queue {
                color: #666;
                font-size: 0.9rem;
                margin-bottom: 1rem;
            }
            button {
                margin-top: 1rem;
                padding: 0.5rem 1.5rem;
                font-size: 1rem;
                cursor: pointer;
            }
            .footer {
                margin-top: 2rem;
                color: #888;
                font-size: 0.85rem;
            }
            .ok {
                color: #2a7;
            }
            .err {
                color: #b22;
            }
        </style>
    </head>
    <body>
        <h1>send a message to my little printer</h1>
        <p class="queue">queue: {{.QueueSize}} / {{.QueueMax}}</p>
        {{if .Status}}
        <p class="{{.StatusClass}}">{{.Status}}</p>
        {{end}}
        <form method="post" action="/submit">
            <label for="sender">your name <small>(max 24 chars)</small></label>
            <input
                id="sender"
                name="sender"
                maxlength="24"
                required
                value="{{.Sender}}"
            />
            <label for="message">message <small>(max 280 chars)</small></label>
            <textarea id="message" name="message" maxlength="280" required>
{{.MessageText}}</textarea
            >
            <button type="submit">queue it</button>
        </form>
        <p class="footer">
            a <a href="https://mylesgrant.com/">myles grant</a> (and claude)
            project. inspired by
            <a href="https://www.flickr.com/search/?text=little+printer"
                >little printer</a
            >. permission to deploy granted by
            <a href="https://www.aaronstraupcope.com/">aaron cope</a>. source
            available at
            <a href="https://github.com/grantmd/little-printer"
                >https://github.com/grantmd/little-printer</a
            >.
        </p>
    </body>
</html>
